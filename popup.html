<!DOCTYPE html>

<html lang="fa">
<head>
<meta charset="UTF-8">

<style>

body{
width:190px;
margin:0;
padding:12px;
text-align:center;
font-family:tahoma;
background:rgba(15,23,42,.95);
border-radius:20px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,.4);
}


.title{
font-size:13px;
font-weight:bold;
color:#67e8f9;
margin-bottom:12px;
white-space:nowrap;
text-shadow:0 0 8px #67e8f9;
}


.switch{
width:80px;
height:30px;
background:#1f2937;
border-radius:50px;
padding:3px;
cursor:pointer;
margin:auto;
transition:.3s;
}


.slider{
width:36px;
height:24px;
border-radius:50px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:10px;
color:white;
transition:.3s;
pointer-events:none;
}


.switch.on{
box-shadow:0 0 12px #00ff88;
}

.switch.on .slider{
background:#16a34a;
transform:translateX(40px);
}

.switch.off{
box-shadow:0 0 12px #ff3b3b;
}

.switch.off .slider{
background:#dc2626;
transform:translateX(0px);
}

.footer{
margin-top:10px;
font-size:11px;
font-weight:bold;
color:#ef4444;
text-shadow:0 0 6px #ef4444;
}


</style>

</head>

<body>

<div class="title">
💎 Panel Helper Diamond
</div>

<div id="toggle" class="switch off">

<div class="slider">
OFF
</div>

</div>

<div class="footer">
Developer : Ahura
</div>

<script src="popup.js"></script>

</body>
</html>
